---
name: "VPS 流量监控"
description: "在主屏幕/锁屏显示搬瓦工和 RackNerd 的月度流量使用情况"
author: "fishyo"
homepage: "https://github.com/fishyo/someLoonThings"
icon: "sf-symbol:server.rack.fill"

# API Key 由 bwg.js / racknerd.js 运行后自动存入 BoxJS，Widget 直接读取，无需重复配置

scriptings:
  - generic:
      name: "vps-summary"
      script_url: "https://raw.githubusercontent.com/fishyo/someLoonThings/main/widget/vpsSummary.js"
      timeout: 30

widgets:
  - name: "vps-summary"
    update_interval: 3600
